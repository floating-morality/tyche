version = 3.11.0

runner.dialect = scala3
align.preset = more
maxColumn = 120
project.layout = StandardConvention

align.tokens = [
  {code = "="},
  {code = "%", owner = "Term.ApplyInfix"},
  {code = "%%", owner = "Term.ApplyInfix"},
  {code = "<-"},
  {code = "->"},
  {code = "//"},
  {code = "=>", owner = "Case"}
  {code = "extends"}
]
